apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: maf-support-agent-hpa
  namespace: maf-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: maf-support-agent
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maf-support-agent
  namespace: maf-agents
  labels:
    app: maf-support-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: maf-support-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: maf-support-agent
    spec:
      nodeName: desktop-worker2
      containers:
        - name: maf-support-agent
          image: maf-support-agent:v1
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: maf-agent-config
            - secretRef:
                name: maf-agent-secrets

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
name: maf-ci-online

on:
  workflow_dispatch:
    inputs:
      run_model_comparison:
        description: "Run model comparison benchmark"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  online-tests:
    name: Online agent tests
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          cat > .env << 'EOF'
          AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_CHAT_DEFAULT_DEPLOYMENT=${{ secrets.AZURE_OPENAI_CHAT_DEFAULT_DEPLOYMENT }}
          AZURE_OPENAI_CHAT_FAST_DEPLOYMENT=${{ secrets.AZURE_OPENAI_CHAT_FAST_DEPLOYMENT }}
          AZURE_OPENAI_CHAT_QUALITY_DEPLOYMENT=${{ secrets.AZURE_OPENAI_CHAT_QUALITY_DEPLOYMENT }}
          DEFAULT_CHAT_MODEL=${{ secrets.DEFAULT_CHAT_MODEL }}
          EOF

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run online test suite
        env:
          RUN_LLM_TESTS: "1"
          RUN_MODEL_COMPARISON: ${{ github.event.inputs.run_model_comparison == 'true' && '1' || '0' }}
          RUN_DRIFT_CHECK: "1"
          REQUIRE_BASELINE: "1"
        run: |
          python run_test_suite.py

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maf-online-reports
          path: reports/
          if-no-files-found: ignore